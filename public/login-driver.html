<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BusGo – Driver Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="login-page">
    <div class="login-box">
      <div class="login-logo" style="background:linear-gradient(135deg,#22c55e,#16a34a);">🚌</div>
      <h1>Driver Login</h1>
      <p class="subtitle">Enter your credentials to share your location</p>

      <div class="form-group">
        <label class="form-label" for="pass">Driver Password</label>
        <input class="input" id="pass" type="password" placeholder="Enter driver password"
               autocomplete="current-password">
      </div>

      <button class="login-btn" id="loginBtn" onclick="login()"
        style="background:linear-gradient(135deg,#22c55e,#16a34a);box-shadow:0 4px 24px rgba(34,197,94,0.4);">
        Sign In →
      </button>
      <div class="error-msg" id="err"></div>
      <a class="back-link" href="index.html">← Back to Home</a>
    </div>
  </div>

  <script>
    if (sessionStorage.getItem("driverToken")) location.href = "driver.html";

    async function login() {
      const pass = document.getElementById("pass").value;
      const btn  = document.getElementById("loginBtn");
      const err  = document.getElementById("err");

      if (!pass) {
        err.textContent = "Please enter a password.";
        err.classList.add("show");
        return;
      }

      btn.innerHTML = '<span class="spinner"></span> Signing in…';
      btn.disabled = true;
      err.classList.remove("show");

      try {
        const res  = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ role: "driver", password: pass })
        });
        const data = await res.json();

        if (data.ok) {
          sessionStorage.setItem("driverToken", data.token);
          btn.innerHTML = "✓ Success!";
          setTimeout(() => location.href = "driver.html", 300);
        } else {
          err.textContent = "❌ " + (data.error || "Invalid credentials");
          err.classList.add("show");
          btn.textContent = "Sign In →";
          btn.disabled = false;
        }
      } catch (e) {
        err.textContent = "❌ Server error. Try again.";
        err.classList.add("show");
        btn.textContent = "Sign In →";
        btn.disabled = false;
      }
    }

    document.getElementById("pass")
      .addEventListener("keydown", e => e.key === "Enter" && login());
  </script>
</body>
</html>
