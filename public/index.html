<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BusGo – College Bus Tracker</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="landing">
    <div class="landing-bg-orb orb1"></div>
    <div class="landing-bg-orb orb2"></div>

    <div class="landing-content">
      <div class="landing-badge">
        <span>Live Tracking Active</span>
      </div>

      <h1>Your Bus,<br>Real‑Time.</h1>
      <p>Track college buses live, get accurate ETAs, and never miss your ride again.</p>

      <div class="role-grid">
        <a class="role-card" href="student.html">
          <div class="role-icon-wrap" style="background:rgba(108,99,255,0.15);">🎓</div>
          <span class="name">Student</span>
          <span class="desc">Track buses live</span>
        </a>
        <a class="role-card" href="login-driver.html">
          <div class="role-icon-wrap" style="background:rgba(34,197,94,0.15);">🚌</div>
          <span class="name">Driver</span>
          <span class="desc">Share your location</span>
        </a>
        <a class="role-card" href="login-admin.html">
          <div class="role-icon-wrap" style="background:rgba(245,158,11,0.15);">🛠️</div>
          <span class="name">Admin</span>
          <span class="desc">Manage the fleet</span>
        </a>
      </div>

      <p style="margin-top:32px;margin-bottom:0;font-size:12px;color:var(--text-3);">
        Powered by real-time GPS · Built for campus life
      </p>
    </div>
  </div>
</body>
</html>
